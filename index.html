<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Data Entry 🧾</title>
    <style>
        :root {
            --primary: #5c6bc0;
            --cash: #66bb6a;
            --kpay: #29b6f6;
            --mmqr: #ab47bc;
            --bg: #f8fafc; /* ပိုမိုနုသော နောက်ခံအရောင် */
            --card-bg: #ffffff;
        }

        /* Chrome, Safari, Edge, Opera - အတိုးလျော့မြှား ဖျောက်ရန် */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox - အတိုးလျော့မြှား ဖျောက်ရန် */
        input[type=number] {
            -moz-appearance: textfield;
        }

        body {
            font-family: 'Inter', 'Pyidaungsu', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #444;
        }

        .container { max-width: 1200px; margin: auto; }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .stat-card h4 { margin: 0; font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .stat-card .amt { font-size: 1.25rem; font-weight: 700; margin-top: 5px; }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        .panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid #eef2f6;
        }

        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 5px; color: #555; }
        
        input, select, textarea {
            width: 100%; padding: 11px; border: 1px solid #dee2e6; border-radius: 8px; 
            box-sizing: border-box; font-size: 14px; outline: none; transition: 0.2s;
        }

        input:focus { border-color: var(--primary); }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; margin-top: 10px; transition: 0.3s;
        }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:disabled { background: #ccc; }
        .btn-print { background: #455a64; color: white; width: auto; float: right; padding: 8px 16px; }

        .sc-v { font-weight: bold; color: var(--primary); font-size: 12px; margin-top: 4px; }

        /* Table */
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #f1f5f9; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px; z-index: 1000; width: 280px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 999; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .panel { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: #475569; margin-bottom: 20px;">Billing Data Entry 🧾</h2>

    <div class="dashboard">
        <div class="stat-card"><h4>Total Revenue</h4><div class="amt" id="totalAll">0 Ks</div></div>
        <div class="stat-card" style="border-color: var(--cash);"><h4>Cash</h4><div class="amt" id="totalCash" style="color:var(--cash)">0 Ks</div></div>
        <div class="stat-card" style="border-color: var(--kpay);"><h4>Kpay</h4><div class="amt" id="totalKpay" style="color:var(--kpay)">0 Ks</div></div>
        <div class="stat-card" style="border-color: var(--mmqr);"><h4>MMQR</h4><div class="amt" id="totalMMQR" style="color:var(--mmqr)">0 Ks</div></div>
    </div>

    <div class="main-grid">
        <div class="panel no-print">
            <form id="billingForm">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Invoice No</label>
                    <input type="text" id="invoiceNo" placeholder="INV-001" required>
                </div>
                <div class="form-group">
                    <label>Side Code (Numbers Only)</label>
                    <input type="number" id="sideCode" placeholder="01" oninput="document.getElementById('scv').innerText='HTN-BL-'+this.value">
                    <div class="sc-v" id="scv">HTN-BL-</div>
                </div>
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customer" required>
                </div>
                <div class="form-group">
                    <label>Plan</label>
                    <select id="plan">
                        <option>15 Mbps</option><option>25 Mbps</option><option>35 Mbps</option><option>50 Mbps</option><option>100 Mbps</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month (e.g. 1, 2)</label>
                    <input type="number" id="month" placeholder="1" required>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="method" onchange="const t=document.getElementById('tB'); t.style.display=(this.value=='Cash'?'none':'block')">
                        <option value="Cash">Cash</option>
                        <option value="Kpay">Kpay</option>
                        <option value="MMQR">MMQR</option>
                    </select>
                </div>
                <div class="form-group" id="tB" style="display:none;">
                    <label>Payment Time</label>
                    <input type="time" id="time">
                </div>
                <div class="form-group">
                    <label>Amount (Ks)</label>
                    <input type="number" id="amount" required>
                </div>
                <div class="form-group">
                    <label>Remark</label>
                    <textarea id="remark" rows="1"></textarea>
                </div>
                <button type="button" class="btn" style="background:#f8fafc; border:1px solid #ddd; color:#64748b;" onclick="document.getElementById('cm').style.display='block';document.getElementById('ov').style.display='block'">💰 Cash Breakdown</button>
                <button type="submit" class="btn btn-save" id="sBtn">Save to Sheet</button>
            </form>
        </div>

        <div class="panel" id="printArea">
            <button class="btn btn-print no-print" onclick="window.print()">🖨️ Print PDF</button>
            <h3 style="margin:0 0 15px 0; color: #64748b;">Recent Transactions</h3>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Inv</th>
                            <th>Side Code</th>
                            <th>Customer</th>
                            <th>Month</th>
                            <th>Method</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="ov" onclick="this.style.display='none';document.getElementById('cm').style.display='none'"></div>
<div class="modal" id="cm">
    <h4 style="margin:0 0 15px 0">Cash Counter</h4>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;"><span>10000:</span> <input type="number" class="nt" data-v="10000" style="width:100px; padding:5px;"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;"><span>5000:</span> <input type="number" class="nt" data-v="5000" style="width:100px; padding:5px;"></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;"><span>1000:</span> <input type="number" class="nt" data-v="1000" style="width:100px; padding:5px;"></div>
    <button class="btn btn-save" onclick="document.getElementById('cm').style.display='none';document.getElementById('ov').style.display='none'">Done</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxa6gxraGYyMgvUnfueg-X2CEJbZaJlyNXLT8uUgjXcrio6L2OS2HwKUqJ9SQa7lwL3XQ/exec";

    let ts = { Cash: 0, Kpay: 0, MMQR: 0, G: 0 };
    document.getElementById('date').valueAsDate = new Date();

    document.getElementById('billingForm').onsubmit = function(e) {
        e.preventDefault();
        const b = document.getElementById('sBtn');
        b.innerText = "Syncing..."; b.disabled = true;

        const d = {
            date: document.getElementById('date').value,
            invoice: document.getElementById('invoiceNo').value,
            side: "HTN-BL-" + document.getElementById('sideCode').value,
            customer: document.getElementById('customer').value,
            plan: document.getElementById('plan').value,
            month: document.getElementById('month').value,
            method: document.getElementById('method').value,
            time: document.getElementById('time').value || '-',
            amount: parseInt(document.getElementById('amount').value),
            remark: document.getElementById('remark').value
        };

        ts[d.method] += d.amount;
        ts.G += d.amount;
        document.getElementById('totalAll').innerText = ts.G.toLocaleString() + " Ks";
        document.getElementById('totalCash').innerText = ts.Cash.toLocaleString() + " Ks";
        document.getElementById('totalKpay').innerText = ts.Kpay.toLocaleString() + " Ks";
        document.getElementById('totalMMQR').innerText = ts.MMQR.toLocaleString() + " Ks";

        const r = `<tr><td>${d.date}</td><td>${d.invoice}</td><td>${d.side}</td><td>${d.customer}</td><td>${d.month}</td><td>${d.method}</td><td>${d.amount.toLocaleString()}</td></tr>`;
        document.getElementById('tableBody').insertAdjacentHTML('afterbegin', r);

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(d)
        }).then(() => {
            alert("Success! Data synced to Sheet.");
            b.innerText = "Save to Sheet"; b.disabled = false;
            this.reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('scv').innerText = "HTN-BL-";
        }).catch(() => {
            alert("Error!");
            b.innerText = "Save to Sheet"; b.disabled = false;
        });
    };
</script>

</body>
</html>
