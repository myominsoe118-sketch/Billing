<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTN Billing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f1f5f9; --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e6e9f0 100%);
            margin: 0; padding: 20px; color: #1e293b; min-height: 100vh;
        }
        .container { max-width: 1450px; margin: auto; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 20px; box-shadow: var(--card-shadow);
            border: 1px solid white; text-align: center;
        }
        .stat-card .amt { font-size: 1.6rem; font-weight: 700; margin-top: 10px; }
        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 25px; align-items: start; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }

        .sticky-side { position: sticky; top: 20px; }
        .glass-panel { background: white; padding: 30px; border-radius: 24px; box-shadow: var(--card-shadow); border: 1px solid #eef2f6; }
        .form-group { margin-bottom: 18px; }
        label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 6px; color: #475569; }
        input, select, textarea { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; background: #fdfdfd; }
        
        .sc-badge { display: inline-block; background: #e0e7ff; color: var(--primary); padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 12px; margin-top: 6px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-print { background: #1e293b; color: white; width: auto; float: right; padding: 10px 20px; }

        .btn-edit { background: #fef3c7; color: #b45309; padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-del { background: #fee2e2; color: #b91c1c; padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 13px; }
        th { padding: 12px 16px; text-align: left; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 16px; background: white; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        td:first-child { border-left: 1px solid #f1f5f9; border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        td:last-child { border-right: 1px solid #f1f5f9; border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        /* Print Settings Updated */
        @media print { 
            .no-print, .sticky-side, .btn-edit, .btn-del, th:last-child, td:last-child { display: none !important; } 
            body { background: white; padding: 0; } 
            .container { max-width: 100%; width: 100%; margin: 0; }
            .main-grid { display: block; }
            .dashboard { grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
            .stat-card { border: 1px solid #ddd; box-shadow: none; padding: 15px; }
            .stat-card .amt { font-size: 1.2rem; }
            .glass-panel { border: none; box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom: 30px;" class="no-print">
        <h2 style="font-size: 2rem; color: #1e1b4b; margin:0;">HTN BILLING SYSTEM</h2>
    </div>

    <div class="dashboard">
        <div class="stat-card" style="border-top: 4px solid var(--primary);"><h4>Grand Revenue</h4><div class="amt" id="totalAll">0 Ks</div></div>
        <div class="stat-card" style="border-top: 4px solid var(--success);"><h4>Cash Total</h4><div class="amt" id="totalCash" style="color:var(--success)">0 Ks</div></div>
        <div class="stat-card" style="border-top: 4px solid var(--info);"><h4>Kpay Total</h4><div class="amt" id="totalKpay" style="color:var(--info)">0 Ks</div></div>
        <div class="stat-card" style="border-top: 4px solid var(--purple);"><h4>MMQR Total</h4><div class="amt" id="totalMMQR" style="color:var(--purple)">0 Ks</div></div>
    </div>

    <div class="main-grid">
        <div class="sticky-side no-print">
            <div class="glass-panel">
                <form id="billingForm">
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="form-group"><label>Entry Date</label><input type="date" id="date" required></div>
                    <div class="form-group"><label>Invoice No</label><input type="text" id="invoiceNo" required></div>
                    <div class="form-group"><label>Side Code</label><input type="number" id="sideCode" oninput="document.getElementById('scv').innerText='HTN-BL-'+this.value"><div class="sc-badge" id="scv">HTN-BL-</div></div>
                    <div class="form-group"><label>Customer Name</label><input type="text" id="customer" required></div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group"><label>Plan</label>
                            <select id="plan">
                                <option selected>15 Mbps</option>
                                <option>25 Mbps</option>
                                <option>35 Mbps</option>
                                <option>50 Mbps</option>
                                <option>100 Mbps</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Month</label><input type="number" id="month" required></div>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="method" onchange="toggleTimeField()">
                            <option value="Cash">Cash</option>
                            <option value="Kpay">Kpay</option>
                            <option value="MMQR">MMQR</option>
                        </select>
                    </div>
                    <div class="form-group" id="timeWrapper" style="display: none;">
                        <label>Payment Time</label>
                        <input type="text" id="time" placeholder="e.g. 14:30">
                    </div>
                    <div class="form-group"><label>Amount (Ks)</label><input type="number" id="amount" required></div>
                    <div class="form-group"><label>Remark</label><textarea id="remark" rows="1"></textarea></div>
                    <button type="submit" class="btn btn-save" id="sBtn">Save Transaction</button>
                </form>
            </div>
        </div>

        <div class="glass-panel">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="font-size: 1.1rem; margin: 0;">Transaction Records</h3>
                <button class="btn btn-print no-print" onclick="window.print()">🖨️ PDF / Print</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Inv</th><th>Side</th><th>Customer</th><th>Time</th><th>Method</th><th>Amount</th><th class="no-print">Actions</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlj6R0DA3JmmpN2j872yIMXJbWfge9Mjuz5Ap_xq-BuDJEN7BJqGIgCTCGFIPdujfuqA/exec";
    let ts = { Cash: 0, Kpay: 0, MMQR: 0, G: 0 };
    let recordList = [];

    document.getElementById('date').valueAsDate = new Date();

    function toggleTimeField() {
        const method = document.getElementById('method').value;
        const wrapper = document.getElementById('timeWrapper');
        const timeInput = document.getElementById('time');
        if (method === 'Kpay' || method === 'MMQR') {
            wrapper.style.display = 'block';
            timeInput.required = true;
            if(timeInput.value === "-") timeInput.value = "";
        } else {
            wrapper.style.display = 'none';
            timeInput.required = false;
            timeInput.value = "-";
        }
    }

    document.getElementById('billingForm').onsubmit = function(e) {
        e.preventDefault();
        const b = document.getElementById('sBtn');
        const editIdx = parseInt(document.getElementById('editIndex').value);

        const d = {
            date: document.getElementById('date').value,
            invoice: document.getElementById('invoiceNo').value,
            side: "HTN-BL-" + document.getElementById('sideCode').value,
            sidePure: document.getElementById('sideCode').value,
            customer: document.getElementById('customer').value,
            plan: document.getElementById('plan').value,
            month: document.getElementById('month').value,
            method: document.getElementById('method').value,
            time: document.getElementById('time').value || '-',
            amount: parseInt(document.getElementById('amount').value),
            remark: document.getElementById('remark').value
        };

        if (editIdx > -1) {
            recordList[editIdx] = d;
            document.getElementById('editIndex').value = "-1";
            b.innerText = "Save Transaction";
        } else {
            recordList.push(d);
        }

        renderTable();
        b.innerText = "Saved ✓";
        setTimeout(() => { b.innerText = "Save Transaction"; }, 1500);
        
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(d) });
        
        this.reset();
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('scv').innerText = "HTN-BL-";
        toggleTimeField();
    };

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        ts = { Cash: 0, Kpay: 0, MMQR: 0, G: 0 };

        recordList.forEach((item, index) => {
            ts[item.method] += item.amount; ts.G += item.amount;
            const r = `<tr>
                <td>${item.date}</td>
                <td><strong>${item.invoice}</strong></td>
                <td><span class="sc-badge">${item.side}</span></td>
                <td>${item.customer}</td>
                <td>${item.time}</td>
                <td>${item.method}</td>
                <td style="font-weight:700">${item.amount.toLocaleString()}</td>
                <td class="no-print">
                    <button class="btn-edit" onclick="editRecord(${index})">Edit</button>
                    <button class="btn-del" onclick="deleteRecord(${index})">Del</button>
                </td>
            </tr>`;
            tbody.insertAdjacentHTML('afterbegin', r);
        });

        document.getElementById('totalAll').innerText = ts.G.toLocaleString() + " Ks";
        document.getElementById('totalCash').innerText = ts.Cash.toLocaleString() + " Ks";
        document.getElementById('totalKpay').innerText = ts.Kpay.toLocaleString() + " Ks";
        document.getElementById('totalMMQR').innerText = ts.MMQR.toLocaleString() + " Ks";
    }

    function editRecord(index) {
        const item = recordList[index];
        document.getElementById('date').value = item.date;
        document.getElementById('invoiceNo').value = item.invoice;
        document.getElementById('sideCode').value = item.sidePure;
        document.getElementById('scv').innerText = "HTN-BL-" + item.sidePure;
        document.getElementById('customer').value = item.customer;
        document.getElementById('plan').value = item.plan;
        document.getElementById('month').value = item.month;
        document.getElementById('method').value = item.method;
        toggleTimeField();
        document.getElementById('time').value = item.time;
        document.getElementById('amount').value = item.amount;
        document.getElementById('remark').value = item.remark;
        document.getElementById('editIndex').value = index;
        document.getElementById('sBtn').innerText = "Update Record";
        window.scrollTo(0,0);
    }

    function deleteRecord(index) {
        if(confirm("ဒီစာရင်းကို ဖျက်မှာ သေချာပါသလား?")) {
            recordList.splice(index, 1);
            renderTable();
        }
    }
</script>
</body>
</html>
