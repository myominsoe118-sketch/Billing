<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Billing System 🧾</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #1e293b;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container { max-width: 1200px; margin: auto; }

        /* Dashboard Summary */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border-bottom: 4px solid var(--primary);
            transition: 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h4 { margin: 0; font-size: 0.85rem; color: #64748b; text-transform: uppercase; }
        .stat-card div { font-size: 1.4rem; font-weight: 600; margin-top: 8px; }

        /* Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
        }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        /* Form & Table Section */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: 600; font-size: 13px; margin-bottom: 5px; }
        input, select, textarea {
            padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;
        }

        .btn {
            padding: 12px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; transition: 0.2s;
        }
        .btn-save { background: var(--primary); color: white; width: 100%; }
        .btn-print { background: var(--dark); color: white; margin-bottom: 15px; }

        /* Side Code Formatting */
        .sc-preview { color: var(--primary); font-weight: bold; font-size: 12px; margin-top: 4px; }

        /* Table Styling */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; font-size: 13px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #edf2f7; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; }

        /* Print Mode */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px; z-index: 1000; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: var(--dark);">Billing Data Entry 🧾</h2>

    <div class="dashboard">
        <div class="stat-card" style="border-color: var(--primary);">
            <h4>Total Net Amount</h4>
            <div id="totalAll">0 Ks</div>
        </div>
        <div class="stat-card" style="border-color: #22c55e;">
            <h4>Cash Total</h4>
            <div id="totalCash">0 Ks</div>
        </div>
        <div class="stat-card" style="border-color: #06b6d4;">
            <h4>Kpay Total</h4>
            <div id="totalKpay">0 Ks</div>
        </div>
        <div class="stat-card" style="border-color: #8b5cf6;">
            <h4>MMQR Total</h4>
            <div id="totalMMQR">0 Ks</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="glass-panel no-print">
            <form id="billingForm">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Side Code (Numbers Only)</label>
                    <input type="text" id="sideCode" placeholder="005" oninput="document.getElementById('scv').innerText = 'HTN-BL-' + this.value">
                    <div class="sc-preview" id="scv">HTN-BL-</div>
                </div>
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customer" required>
                </div>
                <div class="form-group">
                    <label>Plan</label>
                    <select id="plan">
                        <option>15 Mbps</option><option>25 Mbps</option><option>35 Mbps</option><option>50 Mbps</option><option>100 Mbps</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month (e.g. 1, 2)</label>
                    <input type="number" id="month" placeholder="1">
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="method" onchange="const t = document.getElementById('tBox'); t.style.display = (this.value=='Cash'?'none':'block')">
                        <option value="Cash">Cash</option>
                        <option value="Kpay">Kpay</option>
                        <option value="MMQR">MMQR</option>
                    </select>
                </div>
                <div class="form-group" id="tBox" style="display:none;">
                    <label>Payment Time</label>
                    <input type="time" id="time">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="amount" required>
                </div>
                <button type="button" class="btn" style="background:#475569; color:white; margin-bottom:10px;" onclick="openCashModal()">💰 Cash Breakdown</button>
                <button type="submit" class="btn btn-save">Save Transaction</button>
            </form>
        </div>

        <div class="glass-panel" id="printArea">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3 style="margin-top:0">Transaction History</h3>
                <button class="btn btn-print no-print" onclick="window.print()">🖨️ Print PDF</button>
            </div>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Side Code</th>
                            <th>Customer</th>
                            <th>Plan</th>
                            <th>Method</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal" id="cashModal">
    <h3>Cash Note Counter</h3>
    <div id="cashInputs">
        <div style="display:flex; gap:10px; margin-bottom:10px;"><span>10000:</span> <input type="number" class="note" data-val="10000" style="width:60px"></div>
        <div style="display:flex; gap:10px; margin-bottom:10px;"><span>5000:</span> <input type="number" class="note" data-val="5000" style="width:60px"></div>
        <div style="display:flex; gap:10px; margin-bottom:10px;"><span>1000:</span> <input type="number" class="note" data-val="1000" style="width:60px"></div>
    </div>
    <button class="btn btn-save" onclick="closeCashModal()">Done</button>
</div>

<script>
    let stats = { Cash: 0, Kpay: 0, MMQR: 0, Total: 0 };

    document.getElementById('date').valueAsDate = new Date();

    document.getElementById('billingForm').onsubmit = function(e) {
        e.preventDefault();
        const amt = parseInt(document.getElementById('amount').value);
        const method = document.getElementById('method').value;
        const sideCode = "HTN-BL-" + document.getElementById('sideCode').value;

        // Update Stats
        stats[method] += amt;
        stats.Total += amt;
        updateDashboard();

        // Add to Table
        const row = `<tr>
            <td>${document.getElementById('date').value}</td>
            <td>${sideCode}</td>
            <td>${document.getElementById('customer').value}</td>
            <td>${document.getElementById('plan').value}</td>
            <td>${method} ${document.getElementById('time').value}</td>
            <td>${amt.toLocaleString()} Ks</td>
        </tr>`;
        document.getElementById('tableBody').innerHTML += row;

        this.reset();
        document.getElementById('date').valueAsDate = new Date();
    };

    function updateDashboard() {
        document.getElementById('totalAll').innerText = stats.Total.toLocaleString() + " Ks";
        document.getElementById('totalCash').innerText = stats.Cash.toLocaleString() + " Ks";
        document.getElementById('totalKpay').innerText = stats.Kpay.toLocaleString() + " Ks";
        document.getElementById('totalMMQR').innerText = stats.MMQR.toLocaleString() + " Ks";
    }

    function openCashModal() { 
        document.getElementById('cashModal').style.display='block'; 
        document.getElementById('overlay').style.display='block'; 
    }
    function closeCashModal() { 
        document.getElementById('cashModal').style.display='none'; 
        document.getElementById('overlay').style.display='none'; 
    }
</script>

</body>
</html>
