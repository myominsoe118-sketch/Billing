<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Billing Dashboard 🧾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --info: #0ea5e9;
            --purple: #8b5cf6;
            --bg-light: #f1f5f9;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        /* Number Spinners ဖျောက်ရန် */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            margin: 0;
            padding: 20px;
            color: #1e293b;
            min-height: 100vh;
        }

        .container { max-width: 1250px; margin: auto; }

        /* Dashboard Header Cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h4 { margin: 0; font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .amt { font-size: 1.6rem; font-weight: 700; margin-top: 10px; color: #1e293b; }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }

        /* Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h2, h3 { color: #0f172a; font-weight: 700; margin-top: 0; }

        /* Form Elements */
        .form-group { margin-bottom: 18px; }
        label { font-weight: 600; font-size: 13px; display: block; margin-bottom: 6px; color: #475569; }
        
        input, select, textarea {
            width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; 
            box-sizing: border-box; font-size: 14px; outline: none; transition: all 0.2s;
            background: #f8fafc;
        }

        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .sc-badge { display: inline-block; background: #e0e7ff; color: var(--primary); padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 12px; margin-top: 6px; }

        /* Buttons */
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px; cursor: pointer;
            font-weight: 700; font-size: 15px; transition: all 0.3s; margin-top: 10px;
        }
        .btn-save { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3); }
        .btn-save:hover { background: #4338ca; box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4); }
        .btn-save:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }

        .btn-cash { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-cash:hover { background: #e2e8f0; }

        .btn-print { background: #1e293b; color: white; width: auto; float: right; padding: 10px 20px; font-size: 13px; margin: 0; }

        /* Table */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 13px; }
        th { padding: 12px 16px; text-align: left; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; }
        td { padding: 16px; background: white; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        td:first-child { border-left: 1px solid #f1f5f9; border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        td:last-child { border-right: 1px solid #f1f5f9; border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 24px; z-index: 1000; width: 320px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 999; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .glass-panel { box-shadow: none; border: none; background: white; }
            td { background: transparent; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom: 30px;">
        <h2 style="font-size: 2rem; color: #1e1b4b;">Billing Data Entry</h2>
        <p style="color: #64748b; margin-top: -15px;">Management System & Sheet Sync</p>
    </div>

    <div class="dashboard">
        <div class="stat-card" style="border-top: 4px solid var(--primary);">
            <h4>Grand Revenue</h4>
            <div class="amt" id="totalAll">0 Ks</div>
        </div>
        <div class="stat-card" style="border-top: 4px solid var(--success);">
            <h4>Cash Total</h4>
            <div class="amt" id="totalCash" style="color:var(--success)">0 Ks</div>
        </div>
        <div class="stat-card" style="border-top: 4px solid var(--info);">
            <h4>Kpay Total</h4>
            <div class="amt" id="totalKpay" style="color:var(--info)">0 Ks</div>
        </div>
        <div class="stat-card" style="border-top: 4px solid var(--purple);">
            <h4>MMQR Total</h4>
            <div class="amt" id="totalMMQR" style="color:var(--purple)">0 Ks</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="glass-panel no-print">
            <h3 style="font-size: 1.1rem; margin-bottom: 25px;">Entry Details</h3>
            <form id="billingForm">
                <div class="form-group">
                    <label>Entry Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Invoice Number</label>
                    <input type="text" id="invoiceNo" placeholder="INV-2401" required>
                </div>
                <div class="form-group">
                    <label>Side Code (Numbers Only)</label>
                    <input type="number" id="sideCode" placeholder="01" oninput="document.getElementById('scv').innerText='HTN-BL-'+this.value">
                    <div class="sc-badge" id="scv">HTN-BL-</div>
                </div>
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customer" required>
                </div>
                <div class="form-grid-half" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Plan</label>
                        <select id="plan">
                            <option>15 Mbps</option><option>25 Mbps</option><option>35 Mbps</option><option selected>50 Mbps</option><option>100 Mbps</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Month</label>
                        <input type="number" id="month" placeholder="1" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="method" onchange="const t=document.getElementById('tB'); t.style.display=(this.value=='Cash'?'none':'block')">
                        <option value="Cash">Cash</option>
                        <option value="Kpay">Kpay</option>
                        <option value="MMQR">MMQR</option>
                    </select>
                </div>
                <div class="form-group" id="tB" style="display:none;">
                    <label>Payment Time</label>
                    <input type="time" id="time">
                </div>
                <div class="form-group">
                    <label>Amount (Ks)</label>
                    <input type="number" id="amount" required>
                </div>
                <div class="form-group">
                    <label>Remark (Optional)</label>
                    <textarea id="remark" rows="1" style="resize: none;"></textarea>
                </div>
                <button type="button" class="btn btn-cash" onclick="document.getElementById('cm').style.display='block';document.getElementById('ov').style.display='block'">💰 Cash Breakdown</button>
                <button type="submit" class="btn btn-save" id="sBtn">Save Transaction</button>
            </form>
        </div>

        <div class="glass-panel" id="printArea">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="font-size: 1.1rem; margin: 0;">Recent Transactions</h3>
                <button class="btn btn-print no-print" onclick="window.print()">🖨️ Export PDF</button>
            </div>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Inv</th>
                            <th>Side Code</th>
                            <th>Customer</th>
                            <th>Month</th>
                            <th>Method</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="ov" onclick="this.style.display='none';document.getElementById('cm').style.display='none'"></div>
<div class="modal" id="cm">
    <h3 style="font-size: 1rem; margin-bottom: 20px;">Cash Breakdown</h3>
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;">
        <span style="font-weight: 600;">10,000</span> <input type="number" class="nt" data-v="10000" style="width:110px;">
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;">
        <span style="font-weight: 600;">5,000</span> <input type="number" class="nt" data-v="5000" style="width:110px;">
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;">
        <span style="font-weight: 600;">1,000</span> <input type="number" class="nt" data-v="1000" style="width:110px;">
    </div>
    <button class="btn btn-save" style="margin-top:15px;" onclick="document.getElementById('cm').style.display='none';document.getElementById('ov').style.display='none'">Confirm</button>
</div>

<script>
    // သင့်ထံမှရရှိသော Google Sheet Link
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxa6gxraGYyMgvUnfueg-X2CEJbZaJlyNXLT8uUgjXcrio6L2OS2HwKUqJ9SQa7lwL3XQ/exec";

    let ts = { Cash: 0, Kpay: 0, MMQR: 0, G: 0 };
    document.getElementById('date').valueAsDate = new Date();

    document.getElementById('billingForm').onsubmit = function(e) {
        e.preventDefault();
        const b = document.getElementById('sBtn');
        b.innerText = "Syncing..."; b.disabled = true;

        const d = {
            date: document.getElementById('date').value,
            invoice: document.getElementById('invoiceNo').value,
            side: "HTN-BL-" + document.getElementById('sideCode').value,
            customer: document.getElementById('customer').value,
            plan: document.getElementById('plan').value,
            month: document.getElementById('month').value,
            method: document.getElementById('method').value,
            time: document.getElementById('time').value || '-',
            amount: parseInt(document.getElementById('amount').value),
            remark: document.getElementById('remark').value
        };

        // Update Dashboard
        ts[d.method] += d.amount;
        ts.G += d.amount;
        document.getElementById('totalAll').innerText = ts.G.toLocaleString() + " Ks";
        document.getElementById('totalCash').innerText = ts.Cash.toLocaleString() + " Ks";
        document.getElementById('totalKpay').innerText = ts.Kpay.toLocaleString() + " Ks";
        document.getElementById('totalMMQR').innerText = ts.MMQR.toLocaleString() + " Ks";

        // Table UI
        const r = `<tr>
            <td>${d.date}</td>
            <td><strong>${d.invoice}</strong></td>
            <td><span class="sc-badge">${d.side}</span></td>
            <td>${d.customer}</td>
            <td style="text-align:center">${d.month}</td>
            <td><small>${d.method}</small></td>
            <td style="font-weight:700">${d.amount.toLocaleString()}</td>
        </tr>`;
        document.getElementById('tableBody').insertAdjacentHTML('afterbegin', r);

        // Sync with Google Sheet
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(d)
        }).then(() => {
            b.innerText = "Save Transaction"; b.disabled = false;
            this.reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('scv').innerText = "HTN-BL-";
            document.getElementById('tB').style.display = 'none';
        }).catch(() => {
            alert("Sync Error! Please check connection.");
            b.innerText = "Save Transaction"; b.disabled = false;
        });
    };
</script>

</body>
</html>
